<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Tristram Health & Mind</title>
    
    <link rel="stylesheet" href="../css/contato.css">
</head>
<body>

    <a href="index.html">← Voltar para o Início</a>

    <section class="contato">
        <h2>Fale Conosco</h2>
        <p>Estamos aqui para ajudar na sua jornada de bem-estar. Envie sua mensagem e entraremos em contato!</p>

        <form class="form-contato" action="#" method="POST">
            <input type="text" name="nome" placeholder="Seu nome completo" required>
            <input type="email" name="email" placeholder="Seu melhor e-mail" required>
            <textarea name="mensagem" rows="5" placeholder="Como podemos te ajudar hoje?" required></textarea>
            
            <button type="submit">Enviar Mensagem</button>
        </form>
    </section>

</body>
</html>
